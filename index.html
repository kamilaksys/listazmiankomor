<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <title>Dziennik programowania</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      margin: 0;
      padding: 20px;
    }

    .container {
      max-width: 700px;
      margin: auto;
      background: white;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    h1 {
      text-align: center;
    }

    .entry {
      background: #fafafa;
      margin-top: 15px;
      padding: 10px;
      border-left: 4px solid #0077cc;
    }

    .date {
      font-weight: bold;
      margin-bottom: 5px;
    }
  </style>
</head>
<body>

<div class="container">
  <h1>📘 Dziennik zmian</h1>

  <div id="entries"></div>
</div>

<script>
  const entriesData = [
    {
      date: "14.04.2026",
      text: "Dodano funkcję logowania"
    },
    {
      date: "13.04.2026",
      text: "Poprawiono błędy w formularzu"
    }
  ];

  function renderEntries() {
    const container = document.getElementById("entries");

    entriesData.forEach(entry => {
      const div = document.createElement("div");
      div.className = "entry";

      div.innerHTML = `
        <div class="date">${entry.date}</div>
        <div>${entry.text}</div>
      `;

      container.appendChild(div);
    });
  }

  renderEntries();
</script>

</body>
</html>
